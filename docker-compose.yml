services:
  portfolio:
    image: ghcr.io/alexdalat/portfolio:latest
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./public/Resume/:/app/public/Resume/:ro
      - "${RESUME_MOUNT:-./public/Resume/:/home/alex/syncthing/Personal/Work/Resume/:ro}"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "true"
